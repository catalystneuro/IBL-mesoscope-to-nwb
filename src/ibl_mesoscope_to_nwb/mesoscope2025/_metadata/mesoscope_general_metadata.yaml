  experiment_description:
    "This experiment aims to capture the activity of defined neural populations during the IBL decision-making task, using a 2-photon random access mesoscope.
    By imaging calcium activity in excitatory neurons across the dorsal cortex of transgenic mice,
    we seek to characterize how population-level neural activity encodes key task variables such as stimulus, choice, and bias context."
